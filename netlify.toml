[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Serve /admin paths as-is (Decap CMS has its own index.html)
[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200

# SPA fallback — all other routes serve the React app
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
