[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  # Exclude /admin from SPA redirect so Decap CMS loads its own index.html
  conditions = {Role = ["admin"]}

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
